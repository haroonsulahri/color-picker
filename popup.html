<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haroone Color Picker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app" aria-label="Haroone color picker controls">
    <header class="brand">
      <span class="brand-mark"><img src="icons/logo.svg" alt=""></span>
      <span class="brand-copy">
        <span>Haroone</span>
        <strong>Pixel Lens</strong>
      </span>
    </header>

    <p id="statusText" class="status" aria-live="polite">Checking this tab...</p>

    <div class="actions">
      <button id="startBtn" class="btn btn-primary" type="button">Start Picker</button>
      <button id="stopBtn" class="btn btn-secondary" type="button">Stop Picker</button>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
